<html>
    <head>
        <title>Forms</title>
        <style>
            h1{
                text-align: center;
                text-decoration: double underline;}
            form{
                border: 1px solid black;
                text-align: center;
                width: 400px;
                margin-left: 150px;
                margin-top: 250px;
                border-radius: 10px;
                border-color: black;
                background-color: lightgray;
                box-shadow: 2px 2px 5px black;
            }
            .i1{
                margin-left: 20px;
            
            }
            .i2{
                margin-left: 26px;
            }
            button{
                background-color:blue;
                color: white;
                padding: 5px;
                border: none;
                border-radius: 5px;
                
            }
            button:hover{
                background-color: lightgoldenrodyellow;
                cursor: pointer;
            }
         
        </style>
    </head>
    <body>
        <form>
            <h1>Studen Login Form</h1>
            uname : <input class = "i1" type = "text" name = "username" id = "username"> <br> <br>
            email  : <input class = "i2" type = "email" name = "email" id="email"> <br> <br>
            Password : <input class = "i3" type = "password" name = "password" id = "password"> <br> <br>
            <button>Login</button>  <br><br>
        </form>
    </body>
</html>
