        <style>
            .nav{
                background-color: rgb(176, 186, 204);
                padding: 20px;
                
               
            }
            .nav , ul{
                display: flex;
                gap: 30px;
                justify-content: flex-end;

            }
            li{
                list-style-type: none;
            }
            img{
                width: 300px;
                height: 100px;
                margin-right: 400px;
                margin-top: 5px;
            }
            input{
                height: 50px;
                width: 300px;
                border-radius: 10px;
                padding: 10px;
                box-shadow: 2px 2px black;
                margin-top: 5px;
            }
            button{
                height: 50px;
                width: 150px;
                color: black;
                border-radius: 10px;
                background-color: wheat;
                margin-top: 5px;
            }
            button:hover{
                background-color: brown;
                
            }
            a{
                text-decoration: none;
             
            }
             a:hover{
                color: black;
            }
            
        </style>
    </head>
